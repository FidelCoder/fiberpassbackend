services:
  mongo:
    image: mongo:7
    container_name: fiberpass-mongo
    restart: unless-stopped
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]
    ports:
      - "27017:27017"
    volumes:
      - fiberpass-mongo:/data/db
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --eval 'try { rs.status().ok } catch (error) { rs.initiate({_id:\"rs0\",members:[{_id:0,host:\"127.0.0.1:27017\"}]}).ok }'"]
      interval: 5s
      timeout: 5s
      retries: 12

volumes:
  fiberpass-mongo:
